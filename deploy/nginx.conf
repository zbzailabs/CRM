server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    add_header Cache-Control "no-store";
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  location = /sw.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /registerSW.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /manifest.json {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|ico|svg|webp|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
